<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
    Energy Copilot Platform — Page 9 v56 MASTER background
    Date         : 2026-05-21
    Canvas       : 1280 x 720
    Zone map     :
      LEFT PANEL  (x 0-185, h 720)
        Logo:               y 0-55
        S1 Building:        y 62-104
        S2 Strategy:        y 110-152
        S3 Chemistry:       y 158-200
        S4 Country:         y 206-248
        Date Range:         y 254-296
        V7a SoH %:          y 306-352
        V7b Cycles Used %:  y 358-404
        V7c Yrs to Replace: y 410-456
        Active Strategy:    y 466-520
        EU Compliance:      y 526-580
        I1 Strategy Insight: y 590-712
      MAIN AREA  (x 195-1275)
        Header:             y 0-50
        KPI strip 5 cards:  y 56-150  (C1-C5)
        Top row:            y 158-360  (V1 left | V2 right)
        Mid row:            y 366-520  (V3 left | V4 right)
        V5 Heatmap:         y 526-620  (full width)
        V6 Scenario table:  y 626-720  (full width)
  -->

  <defs>
    <radialGradient id="bgBase" cx="40%" cy="45%" r="75%">
      <stop offset="0%"   stop-color="#0C1C10"/>
      <stop offset="50%"  stop-color="#06100A"/>
      <stop offset="100%" stop-color="#030A06"/>
    </radialGradient>
    <radialGradient id="auroraAmber" cx="15%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#F4A62A" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#F4A62A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#F4A62A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraBlue" cx="60%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#2980B9" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#2980B9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraGreen" cx="92%" cy="88%" r="40%">
      <stop offset="0%"   stop-color="#27AE60" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#27AE60" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraPurple" cx="50%" cy="75%" r="35%">
      <stop offset="0%"   stop-color="#9B59B6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D2015" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#071510" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="leftFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050D07"/>
      <stop offset="100%" stop-color="#071510"/>
    </linearGradient>
    <linearGradient id="slicerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0E2518" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#091A10" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="dotAmber" overflow="visible">
      <ellipse rx="16" ry="3.5" fill="#F4A62A" opacity="0.55" filter="url(#dotGlow)"/>
      <ellipse rx="6"  ry="1.6" fill="#FFD580" opacity="0.95"/>
    </symbol>
    <symbol id="dotBlue" overflow="visible">
      <ellipse rx="16" ry="3.5" fill="#2980B9" opacity="0.5" filter="url(#dotGlow)"/>
      <ellipse rx="6"  ry="1.6" fill="#9EEDFF" opacity="0.95"/>
    </symbol>
    <symbol id="dotGreen" overflow="visible">
      <ellipse rx="16" ry="3.5" fill="#27AE60" opacity="0.5" filter="url(#dotGlow)"/>
      <ellipse rx="6"  ry="1.6" fill="#A0FFAC" opacity="0.95"/>
    </symbol>
    <symbol id="dotPurple" overflow="visible">
      <ellipse rx="16" ry="3.5" fill="#9B59B6" opacity="0.5" filter="url(#dotGlow)"/>
      <ellipse rx="6"  ry="1.6" fill="#D7A0FF" opacity="0.95"/>
    </symbol>
    <symbol id="dotPink" overflow="visible">
      <ellipse rx="16" ry="3.5" fill="#D4537E" opacity="0.5" filter="url(#dotGlow)"/>
      <ellipse rx="6"  ry="1.6" fill="#FFC1D7" opacity="0.95"/>
    </symbol>
  </defs>

  <!-- BASE -->
  <rect width="1280" height="720" fill="url(#bgBase)"/>
  <rect width="1280" height="720" fill="url(#auroraAmber)"/>
  <rect width="1280" height="720" fill="url(#auroraBlue)"/>
  <rect width="1280" height="720" fill="url(#auroraGreen)"/>
  <rect width="1280" height="720" fill="url(#auroraPurple)"/>

  <!-- Subtle particles -->
  <g fill="#F4C060" opacity="0.35">
    <circle cx="340"  cy="38"  r="0.7"/>
    <circle cx="540"  cy="20"  r="0.5"/>
    <circle cx="740"  cy="50"  r="0.8"/>
    <circle cx="940"  cy="28"  r="0.6"/>
    <circle cx="1120" cy="42"  r="0.7"/>
    <circle cx="1210" cy="58"  r="0.5"/>
    <circle cx="420"  cy="712" r="0.6"/>
    <circle cx="780"  cy="716" r="0.5"/>
    <circle cx="1060" cy="708" r="0.7"/>
  </g>

  <!-- ============================ LEFT PANEL ============================ -->
  <rect x="0" y="0" width="186" height="720" fill="url(#leftFill)"/>
  <line x1="186" y1="0" x2="186" y2="720" stroke="#F4A62A" stroke-width="1.2" opacity="0.35"/>

  <!-- Battery icon (logo) -->
  <rect x="14" y="18" width="26" height="14" rx="2" fill="none" stroke="#F4A62A" stroke-width="1.5" opacity="0.80"/>
  <rect x="40" y="22" width="4" height="6" rx="1" fill="#F4A62A" opacity="0.70"/>
  <rect x="17" y="21" width="16" height="8" rx="1" fill="#F4A62A" opacity="0.55"/>
  <line x1="25" y1="18" x2="25" y2="32" stroke="#FFD580" stroke-width="1.2" opacity="0.90"/>

  <text x="52" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">ENERGY</text>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#F4A62A" letter-spacing="2">LENS</text>
  <text x="52" y="54" font-family="Arial, sans-serif" font-size="8" fill="#3A6A3A" letter-spacing="1">Page 09 · v56</text>

  <!-- Separator -->
  <line x1="14" y1="60" x2="172" y2="60" stroke="#F4A62A" stroke-width="0.5" opacity="0.25"/>

  <!-- ─── 4 SLICERS + DATE RANGE (vertical stack) ─── -->
  <text x="14" y="74" font-family="Arial, sans-serif" font-size="8" fill="#4A8A5A" letter-spacing="1.2">S1 · BUILDING</text>
  <rect x="12" y="78" width="162" height="32" rx="3" fill="url(#slicerFill)" stroke="#1A4A2A" stroke-width="0.8"/>

  <text x="14" y="122" font-family="Arial, sans-serif" font-size="8" fill="#4A8A5A" letter-spacing="1.2">S2 · STRATEGY</text>
  <rect x="12" y="126" width="162" height="32" rx="3" fill="url(#slicerFill)" stroke="#C4820A" stroke-width="0.8"/>

  <text x="14" y="170" font-family="Arial, sans-serif" font-size="8" fill="#4A8A5A" letter-spacing="1.2">S3 · CHEMISTRY</text>
  <rect x="12" y="174" width="162" height="32" rx="3" fill="url(#slicerFill)" stroke="#9B59B6" stroke-width="0.8"/>

  <text x="14" y="218" font-family="Arial, sans-serif" font-size="8" fill="#4A8A5A" letter-spacing="1.2">S4 · COUNTRY</text>
  <rect x="12" y="222" width="162" height="32" rx="3" fill="url(#slicerFill)" stroke="#2980B9" stroke-width="0.8"/>

  <text x="14" y="266" font-family="Arial, sans-serif" font-size="8" fill="#4A8A5A" letter-spacing="1.2">DATE RANGE</text>
  <rect x="12" y="270" width="162" height="32" rx="3" fill="url(#slicerFill)" stroke="#1A4A2A" stroke-width="0.8"/>

  <!-- separator -->
  <line x1="14" y1="316" x2="172" y2="316" stroke="#F4A62A" stroke-width="0.4" opacity="0.20"/>

  <!-- ─── V7 BATTERY HEALTH STRIP (vertical, 3 mini cards) ─── -->
  <text x="14" y="328" font-family="Arial, sans-serif" font-size="8" fill="#9B59B6" letter-spacing="1.2">V7 · BATTERY HEALTH</text>

  <!-- V7a SoH -->
  <rect x="12" y="334" width="162" height="40" rx="3" fill="url(#slicerFill)" stroke="#9B59B6" stroke-width="0.9" opacity="0.85"/>
  <line x1="12" y1="334" x2="174" y2="334" stroke="#9B59B6" stroke-width="1.4" opacity="0.65"/>
  <text x="18" y="346" font-family="Arial, sans-serif" font-size="7" fill="#9B59B6" letter-spacing="0.8" opacity="0.75">SoH %</text>

  <!-- V7b Cycles Used -->
  <rect x="12" y="380" width="162" height="40" rx="3" fill="url(#slicerFill)" stroke="#9B59B6" stroke-width="0.9" opacity="0.85"/>
  <line x1="12" y1="380" x2="174" y2="380" stroke="#9B59B6" stroke-width="1.4" opacity="0.65"/>
  <text x="18" y="392" font-family="Arial, sans-serif" font-size="7" fill="#9B59B6" letter-spacing="0.8" opacity="0.75">CYCLES USED %</text>

  <!-- V7c Yrs to Replace -->
  <rect x="12" y="426" width="162" height="40" rx="3" fill="url(#slicerFill)" stroke="#9B59B6" stroke-width="0.9" opacity="0.85"/>
  <line x1="12" y1="426" x2="174" y2="426" stroke="#9B59B6" stroke-width="1.4" opacity="0.65"/>
  <text x="18" y="438" font-family="Arial, sans-serif" font-size="7" fill="#9B59B6" letter-spacing="0.8" opacity="0.75">YRS TO REPLACE</text>

  <!-- separator -->
  <line x1="14" y1="476" x2="172" y2="476" stroke="#F4A62A" stroke-width="0.4" opacity="0.20"/>

  <!-- ─── Active strategy card ─── -->
  <text x="14" y="488" font-family="Arial, sans-serif" font-size="8" fill="#F4A62A" letter-spacing="1.2">ACTIVE STRATEGY</text>
  <rect x="12" y="492" width="162" height="46" rx="3" fill="url(#slicerFill)" stroke="#F4A62A" stroke-width="0.9"/>
  <line x1="12" y1="492" x2="174" y2="492" stroke="#F4A62A" stroke-width="1.6" opacity="0.70"/>

  <!-- ─── EU compliance status (sidebar repeat) ─── -->
  <text x="14" y="554" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" letter-spacing="1.2">EU 2023/1670</text>
  <rect x="12" y="558" width="162" height="36" rx="3" fill="url(#slicerFill)" stroke="#27AE60" stroke-width="0.9"/>
  <line x1="12" y1="558" x2="174" y2="558" stroke="#27AE60" stroke-width="1.6" opacity="0.70"/>

  <!-- separator -->
  <line x1="14" y1="606" x2="172" y2="606" stroke="#F4A62A" stroke-width="0.4" opacity="0.20"/>

  <!-- ─── I1 Strategy insight (text card) ─── -->
  <text x="14" y="618" font-family="Arial, sans-serif" font-size="8" fill="#D4537E" letter-spacing="1.2">I1 · RECOMMENDATION</text>
  <rect x="12" y="622" width="162" height="90" rx="3" fill="url(#slicerFill)" stroke="#D4537E" stroke-width="0.9" opacity="0.85"/>
  <line x1="12" y1="622" x2="174" y2="622" stroke="#D4537E" stroke-width="1.4" opacity="0.65"/>

  <!-- ============================ HEADER ============================ -->
  <text x="200" y="36" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Battery Dispatch &amp;</text>
  <text x="430" y="36" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#F4A62A" letter-spacing="0.5" filter="url(#titleGlow)">Financial Simulation</text>
  <text x="200" y="52" font-family="Arial, sans-serif" font-size="8" fill="#2A6A3A" letter-spacing="2.5">STRATEGY COMPARISON · 8 CHEMISTRIES · 12 COUNTRIES · EU 2023/1670 · NPV / IRR / PAYBACK</text>
  <line x1="195" y1="56" x2="1270" y2="56" stroke="#F4A62A" stroke-width="0.8" opacity="0.30"/>

  <!-- ============================ KPI STRIP (5 cards, y:60-150) ============================ -->
  <!-- 5 cards equal width: x:195-1275, total 1080, gap 6, card width = (1080 - 4*6) / 5 = 211 -->

  <!-- C1: Annual Savings -->
  <rect x="196" y="62" width="211" height="86" rx="4" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.0" opacity="0.85"/>
  <line x1="196" y1="62" x2="407" y2="62" stroke="#F4A62A" stroke-width="1.6" opacity="0.75"/>
  <text x="208" y="78" font-family="Arial, sans-serif" font-size="8" fill="#F4A62A" letter-spacing="1.4" opacity="0.75">C1 · ANNUAL SAVINGS</text>

  <!-- C2: Payback Period -->
  <rect x="413" y="62" width="211" height="86" rx="4" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.0" opacity="0.85"/>
  <line x1="413" y1="62" x2="624" y2="62" stroke="#F4A62A" stroke-width="1.6" opacity="0.75"/>
  <text x="425" y="78" font-family="Arial, sans-serif" font-size="8" fill="#F4A62A" letter-spacing="1.4" opacity="0.75">C2 · PAYBACK</text>

  <!-- C3: CO2 -->
  <rect x="630" y="62" width="211" height="86" rx="4" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.0" opacity="0.85"/>
  <line x1="630" y1="62" x2="841" y2="62" stroke="#27AE60" stroke-width="1.6" opacity="0.75"/>
  <text x="642" y="78" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" letter-spacing="1.4" opacity="0.75">C3 · CO₂ AVOIDED</text>

  <!-- C4: Efficiency -->
  <rect x="847" y="62" width="211" height="86" rx="4" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.0" opacity="0.85"/>
  <line x1="847" y1="62" x2="1058" y2="62" stroke="#27AE60" stroke-width="1.6" opacity="0.75"/>
  <text x="859" y="78" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" letter-spacing="1.4" opacity="0.75">C4 · ROUND-TRIP EFFICIENCY</text>

  <!-- C5: EU Compliance Status -->
  <rect x="1064" y="62" width="211" height="86" rx="4" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.0" opacity="0.85"/>
  <line x1="1064" y1="62" x2="1275" y2="62" stroke="#27AE60" stroke-width="1.6" opacity="0.75"/>
  <text x="1076" y="78" font-family="Arial, sans-serif" font-size="8" fill="#27AE60" letter-spacing="1.4" opacity="0.75">C5 · EU COMPLIANCE</text>

  <!-- Connector dots — card tops -->
  <use href="#dotAmber" transform="translate(302,62)"/>
  <use href="#dotAmber" transform="translate(519,62)"/>
  <use href="#dotGreen" transform="translate(736,62)"/>
  <use href="#dotGreen" transform="translate(953,62)"/>
  <use href="#dotGreen" transform="translate(1170,62)"/>

  <!-- ============================ TOP MAIN ROW (V1 + V2, y:158-358) ============================ -->
  <!-- Width split: V1 = 395 wide, V2 = 675 wide. Gap 10. -->

  <!-- V1: Strategy Recommender Matrix -->
  <rect x="196" y="158" width="395" height="200" rx="4" fill="url(#panelFill)" stroke="#9B59B6" stroke-width="1.0" opacity="0.85"/>
  <line x1="196" y1="158" x2="591" y2="158" stroke="#9B59B6" stroke-width="1.6" opacity="0.70"/>
  <text x="208" y="176" font-family="Arial, sans-serif" font-size="9" fill="#9B59B6" letter-spacing="1.5" opacity="0.75">V1 · STRATEGY FITNESS MATRIX — 7 bldg-types × 7 strategies</text>

  <!-- V2: 24h Battery Behavior -->
  <rect x="600" y="158" width="675" height="200" rx="4" fill="url(#panelFill)" stroke="#2980B9" stroke-width="1.0" opacity="0.85"/>
  <line x1="600" y1="158" x2="1275" y2="158" stroke="#2980B9" stroke-width="1.6" opacity="0.70"/>
  <text x="612" y="176" font-family="Arial, sans-serif" font-size="9" fill="#2980B9" letter-spacing="1.5" opacity="0.70">V2 · 24h BATTERY BEHAVIOR — charge / discharge / SoC / price</text>

  <!-- Connector dots — top main row -->
  <use href="#dotPurple" transform="translate(393,158)"/>
  <use href="#dotBlue"   transform="translate(938,158)"/>

  <!-- ============================ MID MAIN ROW (V3 + V4, y:366-520) ============================ -->

  <!-- V3: CAPEX vs Payback Scatter -->
  <rect x="196" y="366" width="395" height="154" rx="4" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.0" opacity="0.85"/>
  <line x1="196" y1="366" x2="591" y2="366" stroke="#F4A62A" stroke-width="1.6" opacity="0.70"/>
  <text x="208" y="384" font-family="Arial, sans-serif" font-size="9" fill="#F4A62A" letter-spacing="1.5" opacity="0.75">V3 · CAPEX vs PAYBACK — bubble: capacity, color: chemistry</text>

  <!-- V4: Monthly Net Savings + CO2 dual-axis -->
  <rect x="600" y="366" width="675" height="154" rx="4" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.0" opacity="0.85"/>
  <line x1="600" y1="366" x2="1275" y2="366" stroke="#27AE60" stroke-width="1.6" opacity="0.70"/>
  <text x="612" y="384" font-family="Arial, sans-serif" font-size="9" fill="#27AE60" letter-spacing="1.5" opacity="0.70">V4 · MONTHLY NET SAVINGS + CO₂ — €/yr column · kg CO₂ line</text>

  <!-- Connector dots — mid row -->
  <use href="#dotAmber" transform="translate(393,366)"/>
  <use href="#dotGreen" transform="translate(938,366)"/>

  <!-- ============================ V5 EU HEATMAP (y:526-620, full width) ============================ -->
  <rect x="196" y="526" width="1079" height="94" rx="4" fill="url(#panelFill)" stroke="#D4537E" stroke-width="1.2" opacity="0.85"/>
  <line x1="196" y1="526" x2="1275" y2="526" stroke="#D4537E" stroke-width="1.8" opacity="0.75"/>
  <text x="208" y="544" font-family="Arial, sans-serif" font-size="9" fill="#D4537E" letter-spacing="1.5" opacity="0.80">V5 · EU REGULATION HEATMAP — 12 countries × 8 chemistries</text>

  <!-- Connector dots — V5 row -->
  <use href="#dotPink" transform="translate(735,526)"/>

  <!-- ============================ V6 SCENARIO TABLE (y:626-720, full width) ============================ -->
  <rect x="196" y="626" width="1079" height="90" rx="4" fill="url(#panelFill)" stroke="#2980B9" stroke-width="1.0" opacity="0.85"/>
  <line x1="196" y1="626" x2="1275" y2="626" stroke="#2980B9" stroke-width="1.6" opacity="0.70"/>
  <text x="208" y="644" font-family="Arial, sans-serif" font-size="9" fill="#2980B9" letter-spacing="1.5" opacity="0.75">V6 · SCENARIO COMPARISON — building × strategy × chemistry · NPV / IRR / payback</text>

  <!-- Connector dots — V6 -->
  <use href="#dotBlue" transform="translate(735,626)"/>

  <!-- Bottom pulse bar -->
  <rect x="196" y="717" width="1079" height="2" rx="1" fill="#F4A62A" opacity="0.15"/>
  <rect x="196" y="717" width="320" height="2" rx="1" fill="#F4A62A" opacity="0.55"/>

</svg>
