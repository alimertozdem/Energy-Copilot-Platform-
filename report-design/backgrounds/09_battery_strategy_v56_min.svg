  <defs>
    <radialGradient id="bgBase" cx="40%" cy="45%" r="75%">
      <stop offset="0%"   stop-color="#0C1C10"/>
      <stop offset="50%"  stop-color="#06100A"/>
      <stop offset="100%" stop-color="#030A06"/>
    </radialGradient>
    <radialGradient id="auroraAmber" cx="15%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#F4A62A" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#F4A62A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#F4A62A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraBlue" cx="60%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#2980B9" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#2980B9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraGreen" cx="92%" cy="88%" r="40%">
      <stop offset="0%"   stop-color="#27AE60" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#27AE60" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D2015" stop-opacity="0.90"/>
