<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
    Energy Copilot Platform — Page 9 v56 (MINIMUM MOD of v2)
    Date: 2026-05-21
    Base: 09_battery_strategy_v2.svg
    Modifications:
      LEFT PANEL:
        + Added S3 Chemistry slicer
        + Added S4 Country slicer
        + Added V7 Battery Health strip (3 mini cards)
        ~ Existing Active Strategy + EU Compliance kept
      KPI ROW:
        ~ 4 cards -> 5 cards (resized to 204px each + 8px gaps)
      MAIN VISUALS:
        ~ v2 V4 zone + V2 zone MERGED -> single V2 zone (409 x 225)
        ~ v2 V1 zone -> V1 (Strategy Matrix) — same geometry
        ~ v2 V5 zone -> V5 (EU Heatmap) — same geometry
        ~ v2 V3 zone -> V6 (Scenario Table) — same geometry
