<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
    Page 9 v56 — final empty-frames background WITH logo + title fix
    Date: 2026-05-21
  -->

  <defs>
    <linearGradient id="bgFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E1622"/>
      <stop offset="60%"  stop-color="#0B1320"/>
      <stop offset="100%" stop-color="#15182A"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0F1B26"/>
      <stop offset="100%" stop-color="#0A1420"/>
    </linearGradient>
    <linearGradient id="leftFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A111A"/>
      <stop offset="100%" stop-color="#0E1622"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="dotCyan" overflow="visible">
      <ellipse rx="14" ry="2.8" fill="#3FA9F5" opacity="0.55" filter="url(#glow)"/>
      <ellipse rx="5"  ry="1.4" fill="#A8E0FF" opacity="0.95"/>
    </symbol>
    <symbol id="dotAmber" overflow="visible">
      <ellipse rx="14" ry="2.8" fill="#F4A62A" opacity="0.55" filter="url(#glow)"/>
      <ellipse rx="5"  ry="1.4" fill="#FFD580" opacity="0.95"/>
    </symbol>
    <symbol id="dotGreen" overflow="visible">
      <ellipse rx="14" ry="2.8" fill="#27AE60" opacity="0.55" filter="url(#glow)"/>
      <ellipse rx="5"  ry="1.4" fill="#A8F0BC" opacity="0.95"/>
    </symbol>
    <symbol id="dotCoral" overflow="visible">
      <ellipse rx="14" ry="2.8" fill="#E74C3C" opacity="0.55" filter="url(#glow)"/>
      <ellipse rx="5"  ry="1.4" fill="#FFB3A8" opacity="0.95"/>
    </symbol>
    <symbol id="dotPurple" overflow="visible">
      <ellipse rx="14" ry="2.8" fill="#9B59B6" opacity="0.55" filter="url(#glow)"/>
      <ellipse rx="5"  ry="1.4" fill="#D8B0F0" opacity="0.95"/>
    </symbol>
  </defs>

  <!-- BASE -->
  <rect width="1280" height="720" fill="url(#bgFill)"/>
  <rect x="0" y="0" width="200" height="720" fill="url(#leftFill)"/>

  <!-- ─── LOGO (top-left, matching v2 original) ─── -->
  <rect x="14" y="18" width="26" height="14" rx="2" fill="none" stroke="#F4A62A" stroke-width="1.5" opacity="0.85"/>
  <rect x="40" y="22" width="4" height="6" rx="1" fill="#F4A62A" opacity="0.75"/>
  <rect x="17" y="21" width="16" height="8" rx="1" fill="#F4A62A" opacity="0.55"/>
  <line x1="25" y1="18" x2="25" y2="32" stroke="#FFD580" stroke-width="1.2" opacity="0.95"/>
  <text x="52" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">ENERGY</text>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#F4A62A" letter-spacing="2">LENS</text>
  <text x="52" y="54" font-family="Arial, sans-serif" font-size="8" fill="#3A6A3A" letter-spacing="1">Page 09</text>
  <line x1="14" y1="62" x2="186" y2="62" stroke="#F4A62A" stroke-width="0.5" opacity="0.30"/>

  <!-- ─── HEADER (centered with logo, separate text elements at distinct x) ─── -->
  <text x="222" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Battery Dispatch &amp;</text>
  <text x="530" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#F4A62A" letter-spacing="0.5">Financial Simulation</text>
  <text x="222" y="57" font-family="Arial, sans-serif" font-size="9" fill="#3FA9F5" letter-spacing="2.5">STRATEGY COMPARISON · EU 2023/1542 · NPV / IRR / PAYBACK</text>
  <line x1="215" y1="65" x2="1267" y2="65" stroke="#F4A62A" stroke-width="0.6" opacity="0.30"/>

  <!-- ─── 5 SLICERS ─── -->
  <text x="14" y="80" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">BUILDING NAME</text>
  <rect x="12" y="86" width="175" height="30" rx="3" fill="url(#panelFill)" stroke="#3FA9F5" stroke-width="1.2"/>
  <use href="#dotCyan" transform="translate(99,86)"/>

  <text x="14" y="125" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">STRATEGY</text>
  <rect x="12" y="131" width="175" height="30" rx="3" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.2"/>
  <use href="#dotAmber" transform="translate(99,131)"/>

  <text x="14" y="170" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">CHEMISTRY</text>
  <rect x="12" y="176" width="175" height="30" rx="3" fill="url(#panelFill)" stroke="#9B59B6" stroke-width="1.2"/>
  <use href="#dotPurple" transform="translate(99,176)"/>

  <text x="14" y="215" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">COUNTRY</text>
  <rect x="12" y="221" width="175" height="30" rx="3" fill="url(#panelFill)" stroke="#3FA9F5" stroke-width="1.2"/>
  <use href="#dotCyan" transform="translate(99,221)"/>

  <text x="14" y="260" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">DATE RANGE</text>
  <rect x="12" y="266" width="175" height="30" rx="3" fill="url(#panelFill)" stroke="#E74C3C" stroke-width="1.2"/>
  <use href="#dotCoral" transform="translate(99,266)"/>

  <!-- ─── ACTIVE STRATEGY ─── -->
  <text x="14" y="308" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">ACTIVE STRATEGY</text>
  <rect x="12" y="314" width="175" height="52" rx="3" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.2"/>
  <use href="#dotGreen" transform="translate(99,314)"/>

  <!-- ─── V7 HEALTH (3 mini cards) ─── -->
  <text x="14" y="378" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">BATTERY HEALTH</text>
  <rect x="12" y="384" width="175" height="36" rx="3" fill="url(#panelFill)" stroke="#9B59B6" stroke-width="1.2"/>
  <use href="#dotPurple" transform="translate(99,384)"/>
  <rect x="12" y="426" width="175" height="36" rx="3" fill="url(#panelFill)" stroke="#9B59B6" stroke-width="1.2"/>
  <use href="#dotPurple" transform="translate(99,426)"/>
  <rect x="12" y="468" width="175" height="36" rx="3" fill="url(#panelFill)" stroke="#9B59B6" stroke-width="1.2"/>
  <use href="#dotPurple" transform="translate(99,468)"/>

  <!-- ─── EU 2023/1542 ─── -->
  <text x="14" y="516" font-family="Arial, sans-serif" font-size="8" fill="#7B8B9A" letter-spacing="1.2">EU 2023/1542</text>
  <rect x="12" y="522" width="175" height="46" rx="3" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.2"/>
  <use href="#dotGreen" transform="translate(99,522)"/>

  <!-- ─── KPI x5 (y:75-135) ─── -->
  <rect x="215" y="75" width="204" height="60" rx="3" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.2"/>
  <use href="#dotGreen" transform="translate(317,75)"/>

  <rect x="426" y="75" width="204" height="60" rx="3" fill="url(#panelFill)" stroke="#3FA9F5" stroke-width="1.2"/>
  <use href="#dotCyan" transform="translate(528,75)"/>

  <rect x="637" y="75" width="204" height="60" rx="3" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.2"/>
  <use href="#dotGreen" transform="translate(739,75)"/>

  <rect x="848" y="75" width="204" height="60" rx="3" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.2"/>
  <use href="#dotAmber" transform="translate(950,75)"/>

  <rect x="1059" y="75" width="204" height="60" rx="3" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.2"/>
  <use href="#dotAmber" transform="translate(1161,75)"/>

  <!-- ─── MIDDLE ROW — V1 + V2 ─── -->
  <rect x="215" y="155" width="635" height="210" rx="3" fill="url(#panelFill)" stroke="#3FA9F5" stroke-width="1.2"/>
  <use href="#dotCyan" transform="translate(532,155)"/>

  <rect x="858" y="155" width="409" height="210" rx="3" fill="url(#panelFill)" stroke="#F4A62A" stroke-width="1.2"/>
  <use href="#dotAmber" transform="translate(1062,155)"/>
  <!-- ─── BOTTOM ROW — V5 + V6 ─── -->
  <rect x="215" y="385" width="370" height="323" rx="3" fill="url(#panelFill)" stroke="#E74C3C" stroke-width="1.2"/>
  <use href="#dotCoral" transform="translate(400,385)"/>

  <rect x="593" y="385" width="674" height="323" rx="3" fill="url(#panelFill)" stroke="#27AE60" stroke-width="1.2"/>
  <use href="#dotGreen" transform="translate(930,385)"/>

</svg>
