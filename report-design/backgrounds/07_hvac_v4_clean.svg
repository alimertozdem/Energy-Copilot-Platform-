<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
    Energy Copilot Platform — Page 7: HVAC & Building Envelope
    Background v4 — Clean frames · Left sidebar · HVAC color theme
    Canvas 1280×720 · Header 68px · Sidebar 200px · 2026-05-04

    Layout:
      Header bar:    x=0   y=0    w=1280  h=68   (logo + title — same as pages 1–6)
      Left sidebar:  x=0   y=68   w=200   h=652  (slicers S1–S5)
      KPI cards:     y=78  h=82   (6 cards, x=210–1270)
      Row 2:         y=168 h=222  (V1 chart x=210 w=420 | V2 table x=636 w=634)
      Row 3:         y=398 h=280  (V3 x=210 w=349 | V4 x=565 w=349 | V5 x=920 w=350)
  -->

  <defs>
    <!-- Dark navy background -->
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%"   stop-color="#0E1B30"/>
      <stop offset="62%"  stop-color="#0A1528"/>
      <stop offset="100%" stop-color="#060E1C"/>
    </radialGradient>

    <!-- HVAC: heating warm glow — bottom-left -->
    <radialGradient id="aHeat" cx="5%" cy="95%" r="58%">
      <stop offset="0%"   stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="45%"  stop-color="#FF6B35" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>

    <!-- HVAC: cooling glow — top-right -->
    <radialGradient id="aCool" cx="96%" cy="4%" r="52%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.13"/>
      <stop offset="50%"  stop-color="#00D4FF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Ventilation: subtle amber center-bottom -->
    <radialGradient id="aVent" cx="50%" cy="100%" r="40%">
      <stop offset="0%"   stop-color="#FFC107" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>

    <!-- Frosted panel fill for all visual frames -->
    <linearGradient id="pFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0E1C32" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0.82"/>
    </linearGradient>

    <!-- Sidebar fill (slightly darker than content) -->
    <linearGradient id="sbFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#050D1C"/>
      <stop offset="100%" stop-color="#080E1A"/>
    </linearGradient>

    <!-- Slicer box fill -->
    <linearGradient id="slFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0F1E35" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0A1525" stop-opacity="0.96"/>
    </linearGradient>

    <!-- Frame soft-glow filter -->
    <filter id="fGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Dot glow filter -->
    <filter id="dGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Accent dot symbols (small glow ellipse above each frame) -->
    <symbol id="dOrange" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#FF6B35" opacity="0.55" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#FFB07A" opacity="0.92"/>
    </symbol>
    <symbol id="dAmber" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#FFC107" opacity="0.50" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#FFE085" opacity="0.92"/>
    </symbol>
    <symbol id="dGreen" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#1D9E75" opacity="0.55" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#7FE3C0" opacity="0.92"/>
    </symbol>
    <symbol id="dCyan" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#00D4FF" opacity="0.50" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#9EEFFF" opacity="0.92"/>
    </symbol>
    <symbol id="dRed" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#E24B4A" opacity="0.55" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#FF9999" opacity="0.92"/>
    </symbol>
    <symbol id="dPurple" overflow="visible">
      <ellipse rx="19" ry="4"   fill="#9B59B6" opacity="0.55" filter="url(#dGlow)"/>
      <ellipse rx="8"  ry="1.8" fill="#CFA0DF" opacity="0.92"/>
    </symbol>
  </defs>

  <!-- ═══════════════════════════════ BASE BACKGROUND ═══════════════════════════════ -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#aHeat)"/>
  <rect width="1280" height="720" fill="url(#aCool)"/>
  <rect width="1280" height="720" fill="url(#aVent)"/>

  <!-- Sparse particle field -->
  <g fill="#7FB8FF" opacity="0.42">
    <circle cx="310"  cy="40"  r="0.7"/>
    <circle cx="490"  cy="27"  r="0.5"/>
    <circle cx="660"  cy="50"  r="0.8"/>
    <circle cx="840"  cy="33"  r="0.6"/>
    <circle cx="1010" cy="46"  r="0.7"/>
    <circle cx="1150" cy="26"  r="0.5"/>
    <circle cx="1222" cy="55"  r="0.6"/>
    <circle cx="830"  cy="445" r="0.5"/>
    <circle cx="1182" cy="402" r="0.6"/>
    <circle cx="242"  cy="708" r="0.6"/>
    <circle cx="722"  cy="712" r="0.5"/>
    <circle cx="1112" cy="705" r="0.7"/>
  </g>

  <!-- ═══════════════════════════════ HEADER BAR (0–1280 × 0–68) ═══════════════════ -->
  <!-- Logo — identical to all other pages: circle+crosshair, #00D4FF -->
  <g transform="translate(20,15)">
    <rect x="0" y="0" width="46" height="46" rx="9" fill="#0C1A2F" stroke="#00D4FF" stroke-width="1.4" opacity="0.95"/>
    <g stroke="#00D4FF" stroke-width="1.3" fill="none">
      <circle cx="23" cy="23" r="10"/>
      <line x1="23" y1="13" x2="23" y2="33"/>
      <line x1="13" y1="23" x2="33" y2="23"/>
      <rect x="19" y="19" width="8" height="8" fill="#00D4FF" fill-opacity="0.22"/>
    </g>
    <text x="52" y="19" font-family="Inter,Segoe UI,Arial" font-size="8" font-weight="700" fill="#00D4FF" letter-spacing="1.3">ENERGY</text>
    <text x="52" y="31" font-family="Inter,Segoe UI,Arial" font-size="8" font-weight="700" fill="#00D4FF" letter-spacing="1.3">LENS</text>
    <text x="52" y="43" font-family="Inter,Segoe UI,Arial" font-size="6.5" fill="#2C5A7A" letter-spacing="0.8">Page 07</text>
  </g>

  <!-- Page title -->
  <text x="135" y="38" font-family="Inter,Segoe UI,Arial" font-size="25" font-weight="700" fill="#FFFFFF" letter-spacing="0.4">HVAC &amp; <tspan fill="#FF6B35">BUILDING ENVELOPE</tspan></text>
  <text x="135" y="57" font-family="Inter,Segoe UI,Arial" font-size="9" font-weight="500" fill="#7FB8FF" letter-spacing="2.2">MECHANICAL SYSTEMS  ·  THERMAL PERFORMANCE  ·  RETROFIT INTELLIGENCE</text>

  <!-- Title accent bar (fades orange → amber → cyan) -->
  <rect x="135" y="62" width="280" height="1.8" rx="0.9" fill="#FF6B35" opacity="0.55"/>
  <rect x="418"  y="62" width="60"  height="1.8" rx="0.9" fill="#FFC107" opacity="0.40"/>
  <rect x="481"  y="62" width="40"  height="1.8" rx="0.9" fill="#00D4FF" opacity="0.30"/>

  <!-- Thematic icons (top-right, same minimal-circle style as other pages) -->
  <g opacity="0.72">
    <circle cx="995"  cy="34" r="17" fill="none" stroke="#E24B4A" stroke-width="1.2"/>
    <text x="995"  y="38" text-anchor="middle" font-family="Inter,Arial" font-size="8.5" font-weight="700" fill="#E24B4A">COP</text>
    <circle cx="1050" cy="34" r="17" fill="none" stroke="#FFC107" stroke-width="1.2"/>
    <rect x="1046" y="24" width="4"  height="13" rx="2"   fill="none" stroke="#FFC107" stroke-width="1.1"/>
    <circle cx="1048" cy="38" r="3"  fill="#FFC107" opacity="0.55"/>
    <circle cx="1105" cy="34" r="17" fill="none" stroke="#1D9E75" stroke-width="1.2"/>
    <g stroke="#1D9E75" stroke-width="1.0" opacity="0.85">
      <line x1="1096" y1="30" x2="1114" y2="30"/>
      <line x1="1096" y1="34" x2="1114" y2="34"/>
      <line x1="1096" y1="38" x2="1114" y2="38"/>
    </g>
    <circle cx="1160" cy="34" r="17" fill="none" stroke="#9B59B6" stroke-width="1.2"/>
    <text x="1160" y="38" text-anchor="middle" font-family="Inter,Arial" font-size="9" font-weight="700" fill="#9B59B6">CO₂</text>
  </g>

  <!-- Header bottom divider -->
  <line x1="0"   y1="68" x2="1280" y2="68" stroke="#FF6B35" stroke-width="0.5" opacity="0.20"/>
  <line x1="200" y1="68" x2="1280" y2="68" stroke="#1A2D50" stroke-width="0.5" opacity="0.55"/>

  <!-- ═══════════════════════════════ LEFT SIDEBAR (0–200 × 68–720) ══════════════════ -->
  <rect x="0" y="68" width="200" height="652" fill="url(#sbFill)"/>
  <!-- Right separator -->
  <line x1="200" y1="68"  x2="200" y2="720" stroke="#1E2D5F" stroke-width="1"   opacity="0.90"/>
  <line x1="200" y1="68"  x2="200" y2="720" stroke="#FF6B35" stroke-width="0.5" opacity="0.12"/>

  <!-- S1 Date Range — Cyan -->
  <text x="16" y="81" font-family="Inter,Segoe UI,Arial" font-size="6.5" font-weight="600" fill="#5A8FC0" letter-spacing="1.5" opacity="0.75">DATE RANGE</text>
  <rect x="8" y="84"  width="184" height="50" rx="6" fill="url(#slFill)" stroke="#00D4FF" stroke-width="0.9" opacity="0.85" filter="url(#fGlow)"/>

  <!-- S2 Country — Amber -->
  <text x="16" y="148" font-family="Inter,Segoe UI,Arial" font-size="6.5" font-weight="600" fill="#5A8FC0" letter-spacing="1.5" opacity="0.75">COUNTRY</text>
  <rect x="8" y="151" width="184" height="32" rx="6" fill="url(#slFill)" stroke="#FFC107" stroke-width="0.9" opacity="0.85" filter="url(#fGlow)"/>

  <!-- S3 Building Type — Orange -->
  <text x="16" y="197" font-family="Inter,Segoe UI,Arial" font-size="6.5" font-weight="600" fill="#5A8FC0" letter-spacing="1.5" opacity="0.75">BUILDING TYPE</text>
  <rect x="8" y="200" width="184" height="32" rx="6" fill="url(#slFill)" stroke="#FF6B35" stroke-width="0.9" opacity="0.85" filter="url(#fGlow)"/>

  <!-- S4 System Type — Green -->
  <text x="16" y="246" font-family="Inter,Segoe UI,Arial" font-size="6.5" font-weight="600" fill="#5A8FC0" letter-spacing="1.5" opacity="0.75">SYSTEM TYPE</text>
  <rect x="8" y="249" width="184" height="32" rx="6" fill="url(#slFill)" stroke="#1D9E75" stroke-width="0.9" opacity="0.85" filter="url(#fGlow)"/>

  <!-- S5 Building — Red -->
  <text x="16" y="295" font-family="Inter,Segoe UI,Arial" font-size="6.5" font-weight="600" fill="#5A8FC0" letter-spacing="1.5" opacity="0.75">BUILDING</text>
  <rect x="8" y="298" width="184" height="32" rx="6" fill="url(#slFill)" stroke="#E24B4A" stroke-width="0.9" opacity="0.85" filter="url(#fGlow)"/>

  <!-- ═══════════════════════════════ KPI CARDS ROW (6 cards · y=78 · h=82) ══════════ -->
  <!-- x positions: 210 387 564 741 918 1095   width: 171 171 171 171 171 175   gap: 6 -->

  <!-- C1 HVAC Share % — Orange #FF6B35 -->
  <use href="#dOrange" x="296"  y="73"/>
  <rect x="210"  y="78" width="171" height="82" rx="10" fill="url(#pFill)" stroke="#FF6B35" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- C2 HVAC Efficiency — Amber #FFC107 -->
  <use href="#dAmber"  x="473"  y="73"/>
  <rect x="387"  y="78" width="171" height="82" rx="10" fill="url(#pFill)" stroke="#FFC107" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- C3 Avg Insulation — Green #1D9E75 -->
  <use href="#dGreen"  x="650"  y="73"/>
  <rect x="564"  y="78" width="171" height="82" rx="10" fill="url(#pFill)" stroke="#1D9E75" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- C4 Heat Loss kWh/m² — Cyan #00D4FF -->
  <use href="#dCyan"   x="827"  y="73"/>
  <rect x="741"  y="78" width="171" height="82" rx="10" fill="url(#pFill)" stroke="#00D4FF" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- C5 Retrofit Count — Red #E24B4A -->
  <use href="#dRed"    x="1004" y="73"/>
  <rect x="918"  y="78" width="171" height="82" rx="10" fill="url(#pFill)" stroke="#E24B4A" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- C6 HVAC CO₂ tCO₂/yr — Purple #9B59B6 (NEW) -->
  <use href="#dPurple" x="1183" y="73"/>
  <rect x="1095" y="78" width="175" height="82" rx="10" fill="url(#pFill)" stroke="#9B59B6" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- ═══════════════════════════ ROW 2: V1 (chart) + V2 (table) · y=168 · h=222 ════ -->
  <!-- V1 x=210 w=420  |  V2 x=636 w=634  |  gap=6 -->

  <!-- V1 HVAC Energy Breakdown — Orange #FF6B35 -->
  <use href="#dOrange" x="420"  y="163"/>
  <rect x="210"  y="168" width="420" height="222" rx="12" fill="url(#pFill)" stroke="#FF6B35" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- V2 Building HVAC System Summary (table, wider) — Green #1D9E75 -->
  <use href="#dGreen"  x="953"  y="163"/>
  <rect x="636"  y="168" width="634" height="222" rx="12" fill="url(#pFill)" stroke="#1D9E75" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- ═══════════════════════════ ROW 3: V3 + V4 + V5 · y=398 · h=280 ═════════════ -->
  <!-- V3 x=210 w=349 | V4 x=565 w=349 | V5 x=920 w=350  |  gap=6 -->

  <!-- V3 Envelope U-Values (bar chart) — Cyan #00D4FF -->
  <use href="#dCyan"   x="385"  y="393"/>
  <rect x="210"  y="398" width="349" height="280" rx="12" fill="url(#pFill)" stroke="#00D4FF" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- V4 Insulation Score by Building — Amber #FFC107 -->
  <use href="#dAmber"  x="740"  y="393"/>
  <rect x="565"  y="398" width="349" height="280" rx="12" fill="url(#pFill)" stroke="#FFC107" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- V5 Renovation Priority Matrix (scatter) — Red #E24B4A -->
  <use href="#dRed"    x="1095" y="393"/>
  <rect x="920"  y="398" width="350" height="280" rx="12" fill="url(#pFill)" stroke="#E24B4A" stroke-width="1.4" opacity="0.95" filter="url(#fGlow)"/>

  <!-- Footer accent line -->
  <line x1="200" y1="714" x2="1270" y2="714" stroke="#FF6B35" stroke-width="0.5" opacity="0.14"/>

</svg>
