<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1622"/>
      <stop offset="60%" stop-color="#0B1320"/>
      <stop offset="100%" stop-color="#15182A"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="0%" y2="100%">
