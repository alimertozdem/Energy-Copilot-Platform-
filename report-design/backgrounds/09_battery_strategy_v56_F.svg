    <linearGradient id="logoCardFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F0F4F8"/></linearGradient>
    <linearGradient id="ZZZ" x1="0%" y1="0%" x2="100%" y2="100%">
