<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="el-g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F6E56"/>
      <stop offset="1" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#el-g)"/>
  <!-- skyline silhouette -->
  <g fill="#FFFFFF">
    <rect x="22" y="32" width="5" height="14" rx="1.5"/>
    <rect x="29.5" y="25" width="5" height="21" rx="1.5"/>
    <rect x="37" y="35" width="5" height="11" rx="1.5"/>
  </g>
  <!-- pulse node above the tallest tower -->
  <circle cx="32" cy="19" r="2.4" fill="#C0DD97"/>
  <!-- magnifier lens -->
  <circle cx="32" cy="33" r="17" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.92"/>
  <!-- handle -->
  <line x1="44" y1="45" x2="52" y2="53" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.92"/>
