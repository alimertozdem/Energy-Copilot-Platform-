name: freelance-bot cron

on:
  schedule:
    # Every 30 minutes. UTC. (GitHub Actions cron is UTC only.)
    - cron: "*/30 * * * *"
    # Daily digest ~noon Europe/Berlin = 10:30 UTC (≈11:30 winter / 12:30 summer).
    - cron: "30 10 * * *"
    # Weekly digest Sunday ~20:00 Berlin = 18:30 UTC.
    - cron: "30 18 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - daily_digest
          - daily_summary
          - weekly_digest
      dry_run:
        description: "Dry run (no Telegram push, no DB writes for status)"
        required: false
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FREELANCE_GMAIL_USER: ${{ secrets.FREELANCE_GMAIL_USER }}
      FREELANCE_GMAIL_APP_PASSWORD: ${{ secrets.FREELANCE_GMAIL_APP_PASSWORD }}
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Dedup state (jobs.db) is persisted via the Actions cache, NOT committed
      # to the repo. This keeps scraped job/email content out of git and avoids
      # secret-scanning push protection blocking the run.
      - name: Restore bot DB (dedup state)
        uses: actions/cache@v4
        with:
          path: scripts/freelance_bot/data/jobs.db
          key: freelance-bot-db-${{ github.run_id }}
          restore-keys: |
            freelance-bot-db-

      - name: Install dependencies
        working-directory: scripts/freelance_bot
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 10 * * *")   echo "mode=daily_digest" >> $GITHUB_OUTPUT ;;
              "30 18 * * 0")   echo "mode=weekly_digest" >> $GITHUB_OUTPUT ;;
              *)               echo "mode=scan" >> $GITHUB_OUTPUT ;;
            esac
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        working-directory: scripts/freelance_bot
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
      