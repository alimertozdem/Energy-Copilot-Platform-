name: freelance-bot cron

on:
  schedule:
    # Every 30 minutes. UTC. (GitHub Actions cron is UTC only.)
    - cron: "*/30 * * * *"
    # Daily summary at 9:00 Europe/Berlin = 07:00 UTC (winter) / 08:00 UTC (summer).
    # We use 07:30 UTC year-round; close enough for the morning briefing.
    - cron: "30 7 * * *"
    # Weekly digest Sunday 20:00 Berlin = 18:00 / 19:00 UTC. Pick 18:30 UTC.
    - cron: "30 18 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - daily_summary
          - weekly_digest
      dry_run:
        description: "Dry run (no Telegram push, no DB writes for status)"
        required: false
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    # GitHub gives us one schedule trigger at a time. We pick mode from the cron expression.
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FREELANCE_GMAIL_USER: ${{ secrets.FREELANCE_GMAIL_USER }}
      FREELANCE_GMAIL_APP_PASSWORD: ${{ secrets.FREELANCE_GMAIL_APP_PASSWORD }}
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: scripts/freelance_bot
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "30 7 * * *")    echo "mode=daily_summary" >> $GITHUB_OUTPUT ;;
              "30 18 * * 0")   echo "mode=weekly_digest" >> $GITHUB_OUTPUT ;;
              *)               echo "mode=scan" >> $GITHUB_OUTPUT ;;
            esac
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        working-directory: scripts/freelance_bot
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m src.main $ARGS

      - name: Commit DB changes
        if: steps.mode.outputs.dry_run != 'true' && steps.mode.outputs.mode == 'scan'
        working-directory: scripts/freelance_bot
        run: |
          git config user.name  "freelance-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/jobs.db
          if ! git diff --cached --quiet; then
            git commit -m "chore(bot): update jobs.db [skip ci]"
            git push
          else
            echo "No DB changes to commit."
          fi
