# Filter rules — Tier 1 (keyword), Tier 2 (budget), Tier 3 (LLM EnergyLens-fit).

# ─────────────────────────────────────────────────────────────────────────────
# Tier 1 — Keyword pre-filter (cheap). Must contain AT LEAST ONE. Kept to
# EnergyLens-deliverable territory only (no generic data/BI/job keywords).
# ─────────────────────────────────────────────────────────────────────────────
include_keywords:
  # Core niche
  - "microsoft fabric"
  - "ms fabric"
  - "power bi"
  - "powerbi"
  - "dax"
  - "csrd"
  - "esrs"
  - "esg reporting"
  - "ghg protocol"
  - "scope 1"
  - "scope 2"
  - "scope 3"
  - "carbon accounting"
  - "carbon footprint"
  - "sustainability dashboard"
  - "sustainability report"
  - "sustainability reporting"
  - "energy dashboard"
  - "energy analytics"
  - "energy management"
  - "energy data analyst"
  - "energy analyst"
  - "epc rating"
  - "epc compliance"
  - "energy performance certificate"
  - "iso 50001"
  - "enpi"
  - "building energy"
  - "building performance"
  - "bms data"
  - "bacnet"
  - "modbus"
  - "smart building"
  - "esg data analyst"
  - "sustainability data analyst"
  - "esg analyst"
  # EU regulatory radar
  - "eu taxonomy"
  - "esrs e1"
  - "epbd"
  - "meps"
  - "minimum energy performance"
  - "crrem"
  - "stranded asset"
  - "stranding risk"
  - "decarbonisation pathway"
  - "decarbonization pathway"
  - "gresb"
  # Energy domain (EnergyLens modules)
  - "measurement and verification"
  - "monitoring and targeting"
  - "energy audit"
  - "energy benchmarking"
  - "battery storage"
  - "energy storage"
  - "bess"
  - "solar pv"
  - "photovoltaic"
  - "pv monitoring"
  - "demand response"
  - "sub-metering"
  - "submetering"
  - "building automation"
  - "heat pump"
  - "hvac analytics"
  # MS analytics (only meaningful alongside the above in scoring)
  - "direct lake"
  - "onelake"
  - "lakehouse"
  - "kql"
  - "semantic model"
  - "tabular editor"

# Rejected if it contains ANY of these.
exclude_keywords:
  - "tableau only"
  - "tableau specialist"
  - "looker only"
  - "qlik"
  - "blockchain"
  - "crypto"
  - "web3"
  - "nft"
  - "marketing analytics"
  - "seo"
  - "ecommerce"
  - "shopify"
  - "wordpress"
  - "webflow"
  - "social media manager"
  - "video editing"
  - "graphic design only"
  - "logo design"
  - "data entry only"
  - "manual data entry"
  - "transcription"

# ─────────────────────────────────────────────────────────────────────────────
# Tier 2 — Budget thresholds
# ─────────────────────────────────────────────────────────────────────────────
budget:
  fixed_min_eur: 500
  hourly_min_eur: 30
  allow_no_budget: true

fx_to_eur:
  USD: 0.92
  GBP: 1.17
  TRY: 0.030
  CHF: 1.05

# ─────────────────────────────────────────────────────────────────────────────
# Tier 3 — LLM EnergyLens-fit threshold
# ─────────────────────────────────────────────────────────────────────────────
llm_score:
  min_score_to_push: 7        # ONLY strong EnergyLens-deliverable jobs (7-10)
  min_score_to_log: 5
  prompt_temperature: 0.2
  retry_on_error: 2

# ─────────────────────────────────────────────────────────────────────────────
# Anti-spam / volume controls
# ─────────────────────────────────────────────────────────────────────────────
notifications:
  max_per_day: 10
  digest_mode: true
  digest_per_stream: 6
  daily_summary_hour: 9
  weekly_digest_dow: "sun"
  weekly_digest_hour: 20
  quiet_hours_start: 22
  quiet_hours_end: 7
  timezone: "Europe/Berlin"
