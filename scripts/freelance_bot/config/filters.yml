# ─────────────────────────────────────────────────────────────────────────────
# Tier 2 — Budget thresholds
# ─────────────────────────────────────────────────────────────────────────────
budget:
  fixed_min_eur: 500
  hourly_min_eur: 30
  allow_no_budget: true     # employment/board posts rarely state budget -> let LLM decide

# Approximate FX rates for budget normalization.
fx_to_eur:
  USD: 0.92
  GBP: 1.17
  TRY: 0.030
  CHF: 1.05

# ─────────────────────────────────────────────────────────────────────────────
# Tier 3 — LLM semantic score threshold
# ─────────────────────────────────────────────────────────────────────────────
llm_score:
  min_score_to_push: 4        # LOOSENED 6->4: thin volume, surface more for triage
  min_score_to_log: 3
  prompt_temperature: 0.2
  retry_on_error: 2

# ─────────────────────────────────────────────────────────────────────────────
# Anti-spam / volume controls
# ─────────────────────────────────────────────────────────────────────────────
notifications:
  max_per_day: 10
  digest_mode: true
  digest_per_stream: 8        # a bit higher now that we surface more
  daily_summary_hour: 9
  weekly_digest_dow: "sun"
  weekly_digest_hour: 20
  quiet_hours_start: 22
  quiet_hours_end: 7
  timezone: "Europe/Berlin"
