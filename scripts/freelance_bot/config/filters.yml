# Filter rules — Tier 1 (keyword), Tier 2 (budget), Tier 3 (LLM score)
# Edit these to tune what reaches your Telegram. See README for guidance.

# ─────────────────────────────────────────────────────────────────────────────
# Tier 1 — Keyword filters (cheap, run first)
# ─────────────────────────────────────────────────────────────────────────────

