# ─────────────────────────────────────────────────────────────────────────────
# Tier 2 — Budget thresholds
# ─────────────────────────────────────────────────────────────────────────────
budget:
  fixed_min_eur: 500        # skip fixed-price jobs below this
  hourly_min_eur: 30        # skip hourly jobs below this (we bid 60, accept search threshold lower)
  allow_no_budget: true     # if budget is not stated, pass to Tier 3 (LLM decides)

# Approximate FX rates for budget normalization (refresh occasionally).
fx_to_eur:
  USD: 0.92
  GBP: 1.17
  TRY: 0.030
  CHF: 1.05

# ─────────────────────────────────────────────────────────────────────────────
# Tier 3 — LLM semantic score threshold
# ─────────────────────────────────────────────────────────────────────────────
llm_score:
  min_score_to_push: 6        # 1-10 scale, push to Telegram at or above this
  min_score_to_log: 4         # below this we don't even log details (save tokens)
  prompt_temperature: 0.2     # low temperature = consistent scoring
  retry_on_error: 2

# ─────────────────────────────────────────────────────────────────────────────
# Anti-spam / volume controls
# ─────────────────────────────────────────────────────────────────────────────
notifications:
  max_per_day: 10
  # v2 — daily digest: scan only COLLECTS + drafts; one digest is sent at noon.
  digest_mode: true           # true = no live per-match pushes; accumulate for the daily digest
  digest_per_stream: 6        # max items per stream (Jobs / Freelance) in one daily digest
  daily_summary_hour: 9       # local time, push a "X new matches" summary
  weekly_digest_dow: "sun"    # Sunday
  weekly_digest_hour: 20
  quiet_hours_start: 22       # don't push between 22:00 and 07:00 local
  quiet_hours_end: 7
  timezone: "Europe/Berlin"
