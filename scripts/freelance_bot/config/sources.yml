# Job source definitions — RSS feeds + JSON APIs + email inboxes.
# Use environment variables for any credentials; never hardcode.

# ─────────────────────────────────────────────────────────────────────────────
# RSS sources (public, no auth). Niche is narrowed later by keyword filters.
# ─────────────────────────────────────────────────────────────────────────────
rss_sources:
  - name: "RemoteOK — all remote jobs"
    url: "https://remoteok.com/remote-jobs.rss"
    enabled: true
    job_id_prefix: "rok_"

  - name: "WeWorkRemotely — all remote jobs"
    url: "https://weworkremotely.com/remote-jobs.rss"
    enabled: true
    job_id_prefix: "wwr_"

  - name: "Himalayas — all remote jobs"
    url: "https://himalayas.app/jobs/rss"
    enabled: true
    job_id_prefix: "hima_"

  - name: "freelance.de — Data/BI (English-only saved search)"
    url: "https://www.freelance.de/projekte/skill-1234567-rss.xml"
    enabled: false   # optional; needs a real saved-search RSS URL
    job_id_prefix: "fdde_"

  - name: "Indeed — Power BI remote EU"
    url: "https://de.indeed.com/rss?q=power+bi+csrd&l=remote&fromage=3"
    enabled: false   # Indeed public RSS verified EMPTY/deprecated (2026-06) — replaced by Arbeitnow
    job_id_prefix: "indeed_"

# ─────────────────────────────────────────────────────────────────────────────
# JSON-API sources (config-driven field map; see src/sources/json_api.py).
# Arbeitnow = Germany/EU board, English-friendly, includes Werkstudent/junior.
# ─────────────────────────────────────────────────────────────────────────────
json_sources:
  - name: "Arbeitnow — Germany/EU jobs"
    url: "https://www.arbeitnow.com/api/job-board-api"
    enabled: true
    job_id_prefix: "arbn_"
    data_path: "data"
    field_map:
      title: "title"
      description: "description"
      url: "url"
      client_name: "company_name"
      posted_unix: "created_at"

# ─────────────────────────────────────────────────────────────────────────────
# Email IMAP sources — Gmail labels. The PRIMARY multi-platform inbound path.
# Credentials via env: FREELANCE_GMAIL_USER + FREELANCE_GMAIL_APP_PASSWORD.
# ─────────────────────────────────────────────────────────────────────────────
email_sources:
  - name: "Freelance alerts Gmail"
    imap_host: "imap.gmail.com"
    imap_port: 993
    username_env: "FREELANCE_GMAIL_USER"
    password_env: "FREELANCE_GMAIL_APP_PASSWORD"
    enabled: true
    folders:
      - name: "freelancermap"
        parser: "freelancermap"
        job_id_prefix: "fmap_"
      - name: "Malt"
        parser: "malt"
        job_id_prefix: "malt_"
      - name: "Contra"
        parser: "contra"
        job_id_prefix: "contra_"
      - name: "LinkedIn"
        parser: "linkedin"
        job_id_prefix: "li_"

# ─────────────────────────────────────────────────────────────────────────────
# Polling cadence
# ─────────────────────────────────────────────────────────────────────────────
poll:
  rss_lookback_hours: 72      # boards post often; 72h window for a thin niche
  json_lookback_hours: 72
  email_lookback_hours: 48
  dedup_window_days: 90
