# Job source definitions. Focus: places where relevant clients actually appear.
# Broad remote/JSON boards are DISABLED on purpose — they flooded the bot with
# irrelevant dev jobs. We keep targeted, inbound sources only.

# ─────────────────────────────────────────────────────────────────────────────
# RSS sources — ALL DISABLED (broad boards = mostly irrelevant dev roles).
# Re-enable only if a niche, relevant feed is found.
# ─────────────────────────────────────────────────────────────────────────────
rss_sources:
  - name: "RemoteOK — all remote jobs"
    url: "https://remoteok.com/remote-jobs.rss"
    enabled: false   # disabled: dev-heavy, ~95% irrelevant to EnergyLens
    job_id_prefix: "rok_"
  - name: "WeWorkRemotely — all remote jobs"
    url: "https://weworkremotely.com/remote-jobs.rss"
    enabled: false   # disabled: same reason
    job_id_prefix: "wwr_"
  - name: "Himalayas — all remote jobs"
    url: "https://himalayas.app/jobs/rss"
    enabled: false   # disabled: same reason
    job_id_prefix: "hima_"

# ─────────────────────────────────────────────────────────────────────────────
# JSON-API sources — DISABLED (broad German jobs board, not EnergyLens-focused).
# ─────────────────────────────────────────────────────────────────────────────
json_sources:
  - name: "Arbeitnow — Germany/EU jobs"
    url: "https://www.arbeitnow.com/api/job-board-api"
    enabled: false   # disabled: generic employment, not inbound freelance
    job_id_prefix: "arbn_"
    data_path: "data"
    field_map:
      title: "title"
      description: "description"
      url: "url"
      client_name: "company_name"
      posted_unix: "created_at"

# ─────────────────────────────────────────────────────────────────────────────
# Email IMAP sources — the PRIMARY path. Gmail labels:
#   freelancermap = Freelancermap project-agent (tune the alert to energy/ESG/Fabric)
#   Malt / Contra = inbound platform alerts
#   LinkedIn      = job-alert emails (employment stream; also curated manually)
# Credentials via env: FREELANCE_GMAIL_USER + FREELANCE_GMAIL_APP_PASSWORD.
# ─────────────────────────────────────────────────────────────────────────────
email_sources:
  - name: "Freelance alerts Gmail"
    imap_host: "imap.gmail.com"
    imap_port: 993
    username_env: "FREELANCE_GMAIL_USER"
    password_env: "FREELANCE_GMAIL_APP_PASSWORD"
    enabled: true
    folders:
      - name: "freelancermap"
        parser: "freelancermap"
        job_id_prefix: "fmap_"
      - name: "Malt"
        parser: "malt"
        job_id_prefix: "malt_"
      - name: "Contra"
        parser: "contra"
        job_id_prefix: "contra_"
      - name: "LinkedIn"
        parser: "linkedin"
        job_id_prefix: "li_"

poll:
  rss_lookback_hours: 72
  json_lookback_hours: 72
  email_lookback_hours: 48
  dedup_window_days: 90
